name: 🚀 Déploiement BRANCH → DEV

on:
  workflow_call:
    secrets:
      REMOTE_CHEMIN:
        required: true
      SFTP_HOST:
        required: true
      SFTP_USER:
        required: true
      SSH_PRIVATE_KEY:
        required: true

    inputs:
      SFTP_PORT:
        required: false
        type: string
        default: "22"

      ADRESSE_GLOBAL:
        required: true
        type: string

      ADRESSE_LOCAL:
        required: true
        type: string

      remote_env:
        required: true
        type: string

      PATH_ORDER:
        required: false
        type: string
        default: "env-local"

      enable_mirror:
        required: false
        type: boolean

permissions:
  contents: read

jobs:
  deploy-branch-dev:
    name: 🚀 Déployer la branche ${{ github.ref_name }} vers DEV
    runs-on: ubuntu-latest

    steps:
      - name: Validate inputs
        shell: bash
        run: |
          test -n "${{ inputs.ADRESSE_GLOBAL }}" || { echo "::error::ADRESSE_GLOBAL manquant"; exit 1; }
          test -n "${{ inputs.ADRESSE_LOCAL }}" || { echo "::error::ADRESSE_LOCAL manquant"; exit 1; }

          case "${{ inputs.PATH_ORDER }}" in
            local-env|env-local) ;;
            *) echo "::error::PATH_ORDER invalide"; exit 1 ;;
          esac

      - name: Vérifier variables requises
        shell: bash
        env:
          REMOTE_CHEMIN: ${{ secrets.REMOTE_CHEMIN }}
          ADRESSE_GLOBAL: ${{ inputs.ADRESSE_GLOBAL }}
          ADRESSE_LOCAL: ${{ inputs.ADRESSE_LOCAL }}
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          miss=0

          for v in REMOTE_CHEMIN ADRESSE_GLOBAL ADRESSE_LOCAL SFTP_HOST SFTP_USER SSH_PRIVATE_KEY; do
            if [ -z "${!v}" ]; then
              echo "::error title=Variable manquante::$v n'est pas défini."
              miss=1
            else
              echo "::notice::$v OK"
            fi
          done

          [ "$miss" -eq 0 ] || exit 1

      - name: Checkout branche appelante
        uses: actions/checkout@v4

      - name: Construire chemin distant
        id: path
        shell: bash
        env:
          REMOTE_CHEMIN: ${{ secrets.REMOTE_CHEMIN }}
          ADRESSE_GLOBAL: ${{ inputs.ADRESSE_GLOBAL }}
          ADRESSE_LOCAL: ${{ inputs.ADRESSE_LOCAL }}
          PATH_ORDER: ${{ inputs.PATH_ORDER }}
        run: |
          norm() {
            printf "%s" "$1" | sed -e 's#//*#/#g' -e 's#^/##' -e 's#/$##'
          }

          _remote="$(norm "$REMOTE_CHEMIN")"
          _global="$(norm "$ADRESSE_GLOBAL")"
          _local="$(norm "$ADRESSE_LOCAL")"
          _env="dev"

          if [ "$PATH_ORDER" = "env-local" ]; then
            _pair="${_env}/${_local}"
          else
            _pair="${_local}/${_env}"
          fi

          REMOTE_PATH="/${_remote}/${_global}/${_pair}"
          REMOTE_PATH="$(echo "$REMOTE_PATH" | sed -e 's#//*#/#g')"

          echo "REMOTE_PATH=$REMOTE_PATH" >> "$GITHUB_OUTPUT"
          echo "::notice title=REMOTE_PATH::$REMOTE_PATH"

      - name: Préparer agent SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Ajouter known_hosts
        shell: bash
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ inputs.SFTP_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${SFTP_PORT:-22}" "$SFTP_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts

      - name: Tester connexion SSH
        shell: bash
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PORT: ${{ inputs.SFTP_PORT }}
        run: |
          ssh -o BatchMode=yes -o StrictHostKeyChecking=yes \
            -p "${SFTP_PORT:-22}" \
            "$SFTP_USER@$SFTP_HOST" \
            "echo Connexion OK"

      - name: Déployer via rsync
        shell: bash
        env:
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_PORT: ${{ inputs.SFTP_PORT }}
        run: |
          REMOTE_PATH="${{ steps.path.outputs.REMOTE_PATH }}"

          echo "Déploiement vers : $REMOTE_PATH"

          ssh -p "${SFTP_PORT:-22}" "$SFTP_USER@$SFTP_HOST" "[ -d \"$REMOTE_PATH\" ]" \
            || { echo "::error title=Dossier distant manquant::Le dossier $REMOTE_PATH n'existe pas."; exit 1; }

          RSYNC_EXCLUDES=(--exclude='.git/' --exclude='.github/')

          if [ -f ".rsync-ignore" ]; then
            echo "::notice::.rsync-ignore détecté"
            RSYNC_EXCLUDES+=(--exclude-from='.rsync-ignore')
          fi

          rsync -az --delete \
            "${RSYNC_EXCLUDES[@]}" \
            -e "ssh -p ${SFTP_PORT:-22}" \
            ./ "$SFTP_USER@$SFTP_HOST:$REMOTE_PATH/"

          echo "✅ Déploiement terminé"
